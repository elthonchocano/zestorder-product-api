spring:
  application:
    name: zestorder-product-api
  jackson:
    serialization:
      WRITE_BIGDECIMAL_AS_PLAIN: true
  data:
    mongodb:
      auto-index-creation: true
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27017}
      database: zestorder-products
      username: ${MONGO_ROOT_USER}
      password: ${MONGO_ROOT_PASSWORD}
      authentication-database: admin
  cloud:
    function:
      definition: productCreatedProducer
    stream:
      kafka:
        binder:
          brokers: localhost:9092
          producer-properties:
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
            schema.registry.url: http://localhost:8081
            acks: all
            enable.idempotence: true
            retry.backoff.ms: 500
            delivery.timeout.ms: 30000
            request.timeout.ms: 30000
            auto.register.schemas: true
            use.latest.version: true
      bindings:
        productCreatedProducer-out-0:
          binder: kafka-avro
          destination: zestorder.product.created
          content-type: application/avro
          producer:
            partitionCount: 2
            useNativeEncoding: true
      default:
        binder: kafka-avro
      binders:
        kafka-avro:
          type: kafka
          environment:
            spring:
              cloud:
                stream:
                  default:
                    producer:
                      useNativeEncoding: true
                    consumer:
                      useNativeEncoding: true
                  kafka:
                    binder:
                      brokers: localhost:9092
  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # This prevents WebFlux from getting confused by the base URL
    disable-swagger-default-url: true
    # Ensures resources are loaded from the correct webjars location
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: zestorder-product-service
        url: /v3/api-docs

server:
  netty:
    connection-timeout: 2s
    idle-timeout: 60s
    max-keep-alive-requests: 1000

logging:
  otlp:
    enabled: true
  level:
    root: INFO
    io.opentelemetry.extension.trace.propagation: WARN
    # Ensures your business logic logs stay visible
    com.echocano.zestorder.product: INFO

  pattern:
    level: "%5p [${spring.application.name:}, %X{traceId:-}, %X{spanId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, tracing
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: W3C,B3
  otlp:
    tracing:
      endpoint: "http://127.0.0.1:4318/v1/traces"
      transport: http
    logs:
      endpoint: "http://localhost:4317"
    metrics:
      export:
        url: "http://127.0.0.1:4318/v1/metrics"
        step: 10s
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles:
        zestorder.product.delete: 0.5, 0.95, 0.99
        zestorder.product.create: 0.5, 0.95, 0.99
        zestorder.product.find: 0.5, 0.95, 0.99
        zestorder.product.update: 0.5, 0.95, 0.99
      percentiles-histogram:
        http.server.requests: true
  observations:
    key-values:
      application: ${spring.application.name}

zestorder:
  product:
    images:
      min-count: 1
      max-count: 10
      max-size-bytes: 3145728 # 3MB in bytes (3 * 1024 * 1024)
      allowed-types:
        - image/jpeg
        - image/png
        - image/jpg

aws:
  s3:
    region: ${AWS_REGION}
    bucket-name: zestorder-product-images
  credentials:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}